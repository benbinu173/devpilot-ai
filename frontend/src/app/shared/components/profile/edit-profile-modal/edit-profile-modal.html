@if (visible()) {

<div class="modal-overlay" (click)="onClose()">

    <div class="modal-card" role="dialog" aria-modal="true" aria-label="Edit profile" (click)="$event.stopPropagation()">

        <div class="modal-header">

            <div>
                <h2>Edit Profile</h2>
                <p>Update your personal information.</p>
            </div>

            <button
                type="button"
                class="close-btn"
                aria-label="Close"
                (click)="onClose()">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>

        </div>

        <div class="form-grid">

            <div class="form-group">
                <label>Full Name</label>
                <input
                    type="text"
                    placeholder="Enter your full name"
                    [ngModel]="name()"
                    (ngModelChange)="name.set($event)">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input
                    type="email"
                    [value]="profile().email"
                    readonly>
            </div>

            <div class="form-group">
                <label>Role</label>
                <input
                    type="text"
                    placeholder="Frontend Developer"
                    [ngModel]="role()"
                    (ngModelChange)="role.set($event)">
            </div>

            <div class="form-group">
                <label>Company</label>
                <input
                    type="text"
                    placeholder="Company name"
                    [ngModel]="company()"
                    (ngModelChange)="company.set($event)">
            </div>

            <div class="form-group">
                <label>Location</label>
                <input
                    type="text"
                    placeholder="City, Country"
                    [ngModel]="location()"
                    (ngModelChange)="location.set($event)">
            </div>

            <div class="form-group">
                <label>Website</label>
                <input
                    type="url"
                    placeholder="https://example.com"
                    [ngModel]="website()"
                    (ngModelChange)="website.set($event)">
            </div>

            <div class="form-group">
                <label>GitHub</label>
                <input
                    type="url"
                    placeholder="https://github.com/username"
                    [ngModel]="github()"
                    (ngModelChange)="github.set($event)">
            </div>

            <div class="form-group">
                <label>LinkedIn</label>
                <input
                    type="url"
                    placeholder="https://linkedin.com/in/username"
                    [ngModel]="linkedin()"
                    (ngModelChange)="linkedin.set($event)">
            </div>

        </div>

        <div class="form-group">
            <label>Bio</label>
            <textarea
                rows="4"
                placeholder="Tell people a little about yourself..."
                [ngModel]="bio()"
                (ngModelChange)="bio.set($event)">
            </textarea>
        </div>

        <div class="modal-footer">

            <button
                type="button"
                class="secondary-btn"
                (click)="onClose()">
                Cancel
            </button>

            <button
                type="button"
                class="primary-btn"
                (click)="onSave()"
                [disabled]="saving()">
                @if (saving()) {
                    <span class="spinner"></span>
                }
                {{ saving() ? 'Saving...' : 'Save Changes' }}
            </button>

        </div>

    </div>

</div>

}
