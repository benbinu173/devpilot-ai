<div class="snippet-card">

    <div class="snippet-card__header">

        <div>

            <h4 class="snippet-card__title">{{ snippet().title }}</h4>

            <span class="snippet-card__language">{{ snippet().language }}</span>

        </div>

        @if (snippet().isFavorite) {

            <span class="snippet-card__favorite" aria-label="Favorited">

                <svg viewBox="0 0 24 24">
                    <path d="M12 3l2.6 5.6 6.1.6-4.6 4.1 1.3 6-5.4-3.1-5.4 3.1 1.3-6-4.6-4.1 6.1-.6z"></path>
                </svg>

            </span>

        }

    </div>

    <p class="snippet-card__description">

        {{ snippet().description }}

    </p>

    <div class="snippet-card__footer">

        <span class="snippet-card__category">{{ snippet().category }}</span>

        <span class="snippet-card__usage">{{ snippet().usageCount }} uses</span>

    </div>

</div>
