<div class="activity-card">

    <div class="activity-card__left">

        <span
            class="activity-card__icon activity-card__icon--{{ icon() }}"
            aria-hidden="true">

            @switch (icon()) {

                @case ('snippet') {

                    <svg viewBox="0 0 24 24">
                        <path d="M6 3h9l4 4v14H6z"></path>
                        <path d="M15 3v4h4"></path>
                        <line x1="9" y1="13" x2="15" y2="13"></line>
                        <line x1="9" y1="17" x2="13" y2="17"></line>
                    </svg>

                }

                @case ('favorite') {

                    <svg viewBox="0 0 24 24">
                        <path d="M12 3l2.6 5.6 6.1.6-4.6 4.1 1.3 6-5.4-3.1-5.4 3.1 1.3-6-4.6-4.1 6.1-.6z"></path>
                    </svg>

                }

                @case ('ai') {

                    <svg viewBox="0 0 24 24">
                        <rect x="4" y="9" width="16" height="11" rx="2"></rect>
                        <path d="M9 9V6a3 3 0 0 1 6 0v3"></path>
                        <line x1="9" y1="14" x2="9" y2="14"></line>
                        <line x1="15" y1="14" x2="15" y2="14"></line>
                        <line x1="12" y1="3" x2="12" y2="1.5"></line>
                    </svg>

                }

                @case ('workspace') {

                    <svg viewBox="0 0 24 24">
                        <rect x="3" y="4" width="18" height="14" rx="2"></rect>
                        <path d="M7 9l3 3-3 3"></path>
                        <line x1="12" y1="15" x2="16" y2="15"></line>
                    </svg>

                }

                @default {

                    <svg viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="8"></circle>
                    </svg>

                }

            }

        </span>

        <div class="activity-card__content">

            <p class="activity-card__action">{{ action() }}</p>

            <span class="activity-card__type">{{ type() }}</span>

        </div>

    </div>

    <span class="activity-card__time">

        {{ time() }}

    </span>

</div>
