<div class="actions">

    <div class="actions__group">
        <button
            type="button"
            [class.actions__rate--active]="liked()"
            (click)="onLike()"
            title="Helpful"
            aria-label="Mark as helpful"
            [attr.aria-pressed]="liked()">

            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.3a2 2 0 0 0 2-1.7l1.4-9a2 2 0 0 0-2-2.3H14z"></path>
                <path d="M7 22H4a2 2 0 0 1-2-2v-9a2 2 0 0 1 2-2h3"></path>
            </svg>

        </button>

        <button
            type="button"
            [class.actions__rate--active-negative]="disliked()"
            (click)="onDislike()"
            title="Not Helpful"
            aria-label="Mark as not helpful"
            [attr.aria-pressed]="disliked()">

            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.7a2 2 0 0 0-2 1.7l-1.4 9a2 2 0 0 0 2 2.3H10z"></path>
                <path d="M17 2h3a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-3"></path>
            </svg>

        </button>
    </div>

    <span class="actions__divider" aria-hidden="true"></span>

    <div class="actions__group">
        <button
            type="button"
            class="actions__copy"
            [class.actions__copy--copied]="copied()"
            (click)="onCopy()"
            title="Copy"
            [attr.aria-label]="copied() ? 'Copied' : 'Copy response'">

            @if (copied()) {

                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>

                Copied

            } @else {

                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <rect x="9" y="9" width="12" height="12" rx="2"></rect>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                </svg>

                Copy

            }

        </button>

        <button
            type="button"
            (click)="regenerate.emit()"
            title="Regenerate"
            aria-label="Regenerate response">

            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M21 12a9 9 0 1 1-3-6.7"></path>
                <polyline points="21 3 21 9 15 9"></polyline>
            </svg>

        </button>

        <button
            type="button"
            (click)="save.emit()"
            title="Save"
            aria-label="Save as snippet">

            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M6 3h12v18l-6-4-6 4z"></path>
            </svg>

        </button>
    </div>

</div>
