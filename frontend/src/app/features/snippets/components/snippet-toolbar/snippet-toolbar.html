<div class="snippet-toolbar">

    @if (hasSelection()) {

        <div class="toolbar-group">

            <button
                type="button"
                class="toolbar-button"
                (click)="copy()">

                <span class="toolbar-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24">
                        <rect x="9" y="9" width="12" height="12" rx="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                </span>

                <span>Copy</span>

            </button>

            <button
                type="button"
                class="toolbar-button"
                (click)="insertIntoWorkspace()">

                <span class="toolbar-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                </span>

                <span>Insert</span>

            </button>

            @if (!editing()) {

                <button
                    type="button"
                    class="toolbar-button"
                    (click)="edit()">

                    <span class="toolbar-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24">
                            <path d="M12 20h9"></path>
                            <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"></path>
                        </svg>
                    </span>

                    <span>Edit</span>

                </button>

            } @else {

                <button
                    type="button"
                    class="toolbar-button"
                    (click)="save()"
                    [disabled]="!hasUnsavedChanges()">

                    <span class="toolbar-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                    </span>

                    <span>Save</span>

                </button>

                <button
                    type="button"
                    class="toolbar-button"
                    (click)="cancel()">

                    <span class="toolbar-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </span>

                    <span>Cancel</span>

                </button>

            }

            <button
                type="button"
                class="toolbar-button favorite"
                [class.is-active]="snippet()?.isFavorite"
                (click)="favorite()">

                <span
                    class="toolbar-icon toolbar-icon--star"
                    [class.is-active]="snippet()?.isFavorite"
                    aria-hidden="true">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 3l2.6 5.6 6.1.6-4.6 4.1 1.3 6-5.4-3.1-5.4 3.1 1.3-6-4.6-4.1 6.1-.6z"></path>
                    </svg>
                </span>

                <span>

                    @if (snippet()?.isFavorite) {
                        Remove Favorite
                    } @else {
                        Add Favorite
                    }

                </span>

            </button>

        </div>

        <span class="toolbar-divider"></span>

        <div class="toolbar-group">

            <button
                type="button"
                class="toolbar-button danger"
                (click)="delete()">

                <span class="toolbar-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24">
                        <path d="M3 6h18"></path>
                        <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
                        <line x1="10" y1="11" x2="10" y2="17"></line>
                        <line x1="14" y1="11" x2="14" y2="17"></line>
                    </svg>
                </span>

                <span>Delete</span>

            </button>

        </div>

        @if (editing() && hasUnsavedChanges()) {

            <div class="unsaved-indicator">
                <span class="unsaved-indicator__dot" aria-hidden="true"></span>
                Unsaved Changes
            </div>

        }

    } @else {

        <div class="toolbar-placeholder">

            Select a snippet to view available actions.

        </div>

    }

</div>
