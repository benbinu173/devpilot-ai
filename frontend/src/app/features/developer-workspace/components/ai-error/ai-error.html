@if (message()) {

<div class="ai-error">

    <div class="icon" aria-hidden="true">

        <svg viewBox="0 0 24 24">
            <path d="M12 3l10 18H2z"></path>
            <line x1="12" y1="9" x2="12" y2="13"></line>
            <circle cx="12" cy="16.5" r=".75" fill="currentColor" stroke="none"></circle>
        </svg>

    </div>

    <div class="content">

        <h3>

            AI Request Failed

        </h3>

        <p>

            {{ message() }}

        </p>

    </div>

    <div class="actions">

       <button

    type="button"

    class="primary"

    [disabled]="loading()"

    (click)="retry.emit()">

    @if (loading()) {

        <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M21 12a9 9 0 1 1-3-6.7"></path>
        </svg>

        Retrying...

    }

    @else {

        Retry

    }

</button>

       <button

    type="button"

    class="secondary"

    [disabled]="loading()"

    (click)="dismiss.emit()">

    Dismiss

</button>

    </div>

</div>

}
