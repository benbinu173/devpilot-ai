@if (response()) {

<div class="response-panel">

    <div class="response-header">

        <span class="response-header__icon" aria-hidden="true">

            <svg viewBox="0 0 24 24">
                <rect x="4" y="9" width="16" height="11" rx="2"></rect>
                <path d="M9 9V6a3 3 0 0 1 6 0v3"></path>
                <line x1="9" y1="14" x2="9" y2="14"></line>
                <line x1="15" y1="14" x2="15" y2="14"></line>
                <line x1="12" y1="3" x2="12" y2="1.5"></line>
            </svg>

        </span>

        <h3>

            AI Response

        </h3>

    </div>

<div

    #markdown

    class="response-body markdown-body"

    [innerHTML]="html()">

</div>

    <div class="response-actions">

        <button
            type="button"
            (click)="copy.emit()">

            <svg viewBox="0 0 24 24" aria-hidden="true">
                <rect x="9" y="9" width="12" height="12" rx="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>

            Copy

        </button>

        <button
            type="button"
            class="regenerate"
            [disabled]="loading()"
            (click)="regenerate.emit()">

            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M21 12a9 9 0 1 1-3-6.7"></path>
                <polyline points="21 3 21 9 15 9"></polyline>
            </svg>

            {{ loading() ? 'Regenerating…' : 'Regenerate' }}

        </button>

        <button
            type="button"
            (click)="close.emit()">

            <svg viewBox="0 0 24 24" aria-hidden="true">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>

            Close

        </button>

    </div>

</div>

}
