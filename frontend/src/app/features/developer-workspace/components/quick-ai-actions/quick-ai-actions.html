<div class="actions">

    <button
        class="actions__header"
        type="button"
        (click)="toggle()"
        [attr.aria-expanded]="expanded()"
        aria-controls="quick-actions-content">

        <span class="actions__label">
            <span class="ai-dot"></span>
            Quick Actions
        </span>

        <span
            class="actions__chevron"
            [class.actions__chevron--open]="expanded()"
            aria-hidden="true">

            <svg viewBox="0 0 24 24">
                <polyline points="6 9 12 15 18 9"></polyline>
            </svg>

        </span>

    </button>

    @if (expanded()) {

        <div class="actions__grid" id="quick-actions-content">
            @for (action of actions; track action.title) {

                <button
                    type="button"
                    class="action"
                    (click)="run(action)">

                    <span class="action__icon" aria-hidden="true">

                        @switch (action.mode) {

                            @case ('explain') {

                                <svg viewBox="0 0 24 24">
                                    <path d="M12 2l1.6 5.4L19 9l-5.4 1.6L12 16l-1.6-5.4L5 9l5.4-1.6z"></path>
                                </svg>

                            }

                            @case ('debug') {

                                <svg viewBox="0 0 24 24">
                                    <rect x="8" y="8" width="8" height="10" rx="4"></rect>
                                    <line x1="12" y1="4" x2="12" y2="8"></line>
                                    <line x1="4" y1="10" x2="8" y2="10"></line>
                                    <line x1="4" y1="14" x2="8" y2="14"></line>
                                    <line x1="16" y1="10" x2="20" y2="10"></line>
                                    <line x1="16" y1="14" x2="20" y2="14"></line>
                                    <line x1="9" y1="4" x2="7" y2="2"></line>
                                    <line x1="15" y1="4" x2="17" y2="2"></line>
                                </svg>

                            }

                            @case ('refactor') {

                                <svg viewBox="0 0 24 24">
                                    <path d="M17 2l4 4-4 4"></path>
                                    <path d="M3 12v-2a4 4 0 0 1 4-4h14"></path>
                                    <path d="M7 22l-4-4 4-4"></path>
                                    <path d="M21 12v2a4 4 0 0 1-4 4H3"></path>
                                </svg>

                            }

                            @case ('tests') {

                                <svg viewBox="0 0 24 24">
                                    <path d="M9 2h6"></path>
                                    <path d="M10 2v6l-5.5 9.5A2 2 0 0 0 6.2 21h11.6a2 2 0 0 0 1.7-3.5L14 8V2"></path>
                                    <line x1="8" y1="15" x2="16" y2="15"></line>
                                </svg>

                            }

                            @case ('docs') {

                                <svg viewBox="0 0 24 24">
                                    <path d="M4 4.5A2.5 2.5 0 0 1 6.5 2H20v18H6.5A2.5 2.5 0 0 1 4 17.5v-13z"></path>
                                    <path d="M4 17.5A2.5 2.5 0 0 1 6.5 15H20"></path>
                                </svg>

                            }

                            @default {

                                <svg viewBox="0 0 24 24">
                                    <circle cx="12" cy="12" r="8"></circle>
                                </svg>

                            }

                        }

                    </span>

                    <span class="action__title">{{ action.title }}</span>

                </button>

            }
        </div>

    }

</div>
