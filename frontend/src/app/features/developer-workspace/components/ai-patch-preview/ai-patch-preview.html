@if (patch()) {

<div class="patch-preview">

    <div class="header">

        <span class="header__icon" aria-hidden="true">

            <svg viewBox="0 0 24 24">
                <rect x="4" y="9" width="16" height="11" rx="2"></rect>
                <path d="M9 9V6a3 3 0 0 1 6 0v3"></path>
                <line x1="9" y1="14" x2="9" y2="14"></line>
                <line x1="15" y1="14" x2="15" y2="14"></line>
                <line x1="12" y1="3" x2="12" y2="1.5"></line>
            </svg>

        </span>

        <div>

            <h3>AI Patch Preview</h3>

            <small>

                {{ patch()?.action }}

            </small>

        </div>

    </div>

    <div class="section section--summary">

        <h4>Summary</h4>

        <p>

            {{ patch()?.summary }}

        </p>

    </div>

    <div class="section section--explanation">

        <h4>Explanation</h4>

        <p>

            {{ patch()?.explanation }}

        </p>

    </div>

    <div class="footer">

        <span class="badge">

            {{ patch()?.language }}

        </span>

    </div>

</div>

}
