<div class="selection-toolbar">

    @if (loading()) {
        <div class="loading-state">
            <span class="spinner"></span>
            AI is generating...
        </div>
    }

    <button
        type="button"
        [disabled]="loading()"
        (click)="explain.emit()">
        <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 3l1.9 4.6L18.5 9l-4.6 1.9L12 15.5l-1.9-4.6L5.5 9l4.6-1.9L12 3z"></path>
            <path d="M19 15l.9 2.1L22 18l-2.1.9L19 21l-.9-2.1L16 18l2.1-.9L19 15z"></path>
        </svg>
        Explain
    </button>

    <button
        type="button"
        [disabled]="loading()"
        (click)="debug.emit()">
        <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="13" r="7"></circle>
            <path d="M9 4l1.5 2"></path>
            <path d="M15 4l-1.5 2"></path>
            <path d="M5 13H2"></path>
            <path d="M22 13h-3"></path>
            <path d="M5 18l-2 2"></path>
            <path d="M19 18l2 2"></path>
        </svg>
        Debug
    </button>

    <button
        type="button"
        [disabled]="loading()"
        (click)="refactor.emit()">
        <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M17 2l4 4-4 4"></path>
            <path d="M21 6H8a5 5 0 0 0-5 5"></path>
            <path d="M7 22l-4-4 4-4"></path>
            <path d="M3 18h13a5 5 0 0 0 5-5"></path>
        </svg>
        Refactor
    </button>

    <button
        type="button"
        [disabled]="loading()"
        (click)="tests.emit()">
        <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M9 2v6L4 20a1 1 0 0 0 1 2h14a1 1 0 0 0 1-2l-5-12V2"></path>
            <path d="M8.5 15h7"></path>
        </svg>
        Tests
    </button>

    <button
        type="button"
        [disabled]="loading()"
        (click)="docs.emit()">
        <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 4h11l5 5v11a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"></path>
            <path d="M15 4v5h5"></path>
            <line x1="8" y1="13" x2="16" y2="13"></line>
            <line x1="8" y1="17" x2="13" y2="17"></line>
        </svg>
        Docs
    </button>

</div>
