<div class="history">

    <button

        class="header"

        (click)="toggle()"

        [attr.aria-expanded]="expanded()"

        aria-controls="ai-history-content">

        <span class="header__label">

            <span class="header__icon" aria-hidden="true">

                <svg viewBox="0 0 24 24">
                    <rect x="4" y="9" width="16" height="11" rx="2"></rect>
                    <path d="M9 9V6a3 3 0 0 1 6 0v3"></path>
                    <line x1="9" y1="14" x2="9" y2="14"></line>
                    <line x1="15" y1="14" x2="15" y2="14"></line>
                    <line x1="12" y1="3" x2="12" y2="1.5"></line>
                </svg>

            </span>

            AI History

        </span>

        <span class="header__meta">

            <span class="header__count">{{ history().length }}</span>

            <span
                class="header__chevron"
                [class.header__chevron--open]="expanded()"
                aria-hidden="true">

                <svg viewBox="0 0 24 24">
                    <polyline points="6 9 12 15 18 9"></polyline>
                </svg>

            </span>

        </span>

    </button>

    @if (expanded()) {

        <div class="content" id="ai-history-content">

            @for (item of history(); track item.id) {

                <div
                    class="history-item"
                    [class.active]="currentPatch()?.id === item.patch.id"
                    (click)="restore(item.id)">

                    <div class="history-item__main">

                        <div class="title">

                            {{ item.patch.action }}

                        </div>

                        <div class="file">

                            {{ item.fileName }}

                        </div>

                        <div class="time">

                            {{ item.createdAt }}

                        </div>

                    </div>

                    <span class="history-item__restore" aria-hidden="true">

                        <svg viewBox="0 0 24 24">
                            <path d="M3 12a9 9 0 1 0 3-6.7"></path>
                            <polyline points="3 4 3 9 8 9"></polyline>
                        </svg>

                    </span>

                </div>

            }

            @empty {

                <div class="empty">

                    No AI edits yet.

                </div>

            }

        </div>

    }

</div>
