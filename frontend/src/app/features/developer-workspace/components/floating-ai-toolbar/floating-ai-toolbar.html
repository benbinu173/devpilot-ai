@if (visible()) {

    <div class="floating-toolbar"

        [style.left.px]="left()"

        [style.top.px]="top()">

        @if (loading()) {

            <div class="toolbar-loading">

                <svg class="toolbar-loading__spinner" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M21 12a9 9 0 1 1-3-6.7"></path>
                </svg>

                AI Working…

            </div>

        }

        <div class="toolbar-group">

            <button
                [disabled]="loading()"
                (mousedown)="$event.preventDefault()"
                (click)="explain.emit()"
                title="Explain this code">

                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 2l1.6 5.4L19 9l-5.4 1.6L12 16l-1.6-5.4L5 9l5.4-1.6z"></path>
                </svg>

                Explain

            </button>

            <button
                [disabled]="loading()"
                (mousedown)="$event.preventDefault()"
                (click)="debug.emit()"
                title="Debug this code">

                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <rect x="8" y="8" width="8" height="10" rx="4"></rect>
                    <line x1="12" y1="4" x2="12" y2="8"></line>
                    <line x1="4" y1="10" x2="8" y2="10"></line>
                    <line x1="4" y1="14" x2="8" y2="14"></line>
                    <line x1="16" y1="10" x2="20" y2="10"></line>
                    <line x1="16" y1="14" x2="20" y2="14"></line>
                    <line x1="9" y1="4" x2="7" y2="2"></line>
                    <line x1="15" y1="4" x2="17" y2="2"></line>
                </svg>

                Debug

            </button>

            <button
                [disabled]="loading()"
                (mousedown)="$event.preventDefault()"
                (click)="refactor.emit()"
                title="Refactor this code">

                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M17 2l4 4-4 4"></path>
                    <path d="M3 12v-2a4 4 0 0 1 4-4h14"></path>
                    <path d="M7 22l-4-4 4-4"></path>
                    <path d="M21 12v2a4 4 0 0 1-4 4H3"></path>
                </svg>

                Refactor

            </button>

        </div>

        <span class="toolbar-divider"></span>

        <div class="toolbar-group">

            <button
                [disabled]="loading()"
                (mousedown)="$event.preventDefault()"
                (click)="tests.emit()"
                title="Generate tests">

                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M9 2h6"></path>
                    <path d="M10 2v6l-5.5 9.5A2 2 0 0 0 6.2 21h11.6a2 2 0 0 0 1.7-3.5L14 8V2"></path>
                    <line x1="8" y1="15" x2="16" y2="15"></line>
                </svg>

                Tests

            </button>

            <button
                [disabled]="loading()"
                (mousedown)="$event.preventDefault()"
                (click)="docs.emit()"
                title="Generate documentation">

                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M4 4.5A2.5 2.5 0 0 1 6.5 2H20v18H6.5A2.5 2.5 0 0 1 4 17.5v-13z"></path>
                    <path d="M4 17.5A2.5 2.5 0 0 1 6.5 15H20"></path>
                </svg>

                Docs

            </button>

        </div>

    </div>

}
