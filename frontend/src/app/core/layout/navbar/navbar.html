<header class="navbar">

    <div class="navbar__search">

        <span class="navbar__search-icon" aria-hidden="true">

            <svg viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="7"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>

        </span>

        <input
            type="text"
            placeholder="Search..."
            aria-label="Search" />

        <span class="navbar__search-shortcut" aria-hidden="true">⌘K</span>

    </div>

    <div class="navbar__actions">

        <button
            class="navbar__icon-btn"
            type="button"
            aria-label="Notifications">

            <svg viewBox="0 0 24 24">
                <path d="M6 8a6 6 0 0 1 12 0c0 5 2 6 2 6H4s2-1 2-6"></path>
                <path d="M10 21a2 2 0 0 0 4 0"></path>
            </svg>

        </button>

        <button
            class="navbar__avatar-btn"
            type="button"
            aria-label="Profile menu">

            <svg viewBox="0 0 24 24">
                <circle cx="12" cy="8" r="4"></circle>
                <path d="M4 20c0-4 3.6-6 8-6s8 2 8 6"></path>
            </svg>

        </button>

    </div>

</header>
