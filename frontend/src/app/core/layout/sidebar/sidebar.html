<div class="sidebar" [class.sidebar--collapsed]="collapsed()">

    <button
        class="sidebar__toggle"
        type="button"
        (click)="toggleCollapse()"
        [attr.aria-label]="collapsed() ? 'Expand sidebar' : 'Collapse sidebar'"
        [attr.title]="collapsed() ? 'Expand sidebar' : 'Collapse sidebar'">

        <svg viewBox="0 0 24 24" aria-hidden="true">
            <polyline points="15 18 9 12 15 6"></polyline>
        </svg>

    </button>

    <div class="sidebar__logo">

        <span class="sidebar__logo-mark" aria-hidden="true">&gt;_</span>

        <h2>DevPilot AI</h2>

    </div>

    <nav class="sidebar__nav">

        @for (item of menuItems; track item.route) {

            <a
                class="sidebar__link"
                [routerLink]="item.route"
                routerLinkActive="active"
                [attr.title]="collapsed() ? item.title : null">

                <span class="sidebar__link-icon" aria-hidden="true">

                    @switch (item.icon) {

                        @case ('dashboard') {

                            <svg viewBox="0 0 24 24">
                                <rect x="3" y="3" width="8" height="8" rx="1.5"></rect>
                                <rect x="13" y="3" width="8" height="8" rx="1.5"></rect>
                                <rect x="3" y="13" width="8" height="8" rx="1.5"></rect>
                                <rect x="13" y="13" width="8" height="8" rx="1.5"></rect>
                            </svg>

                        }

                        @case ('ai') {

                            <svg viewBox="0 0 24 24">
                                <rect x="4" y="9" width="16" height="11" rx="2"></rect>
                                <path d="M9 9V6a3 3 0 0 1 6 0v3"></path>
                                <line x1="9" y1="14" x2="9" y2="14"></line>
                                <line x1="15" y1="14" x2="15" y2="14"></line>
                                <line x1="12" y1="3" x2="12" y2="1.5"></line>
                            </svg>

                        }

                        @case ('workspace') {

                            <svg viewBox="0 0 24 24">
                                <rect x="3" y="4" width="18" height="14" rx="2"></rect>
                                <path d="M7 9l3 3-3 3"></path>
                                <line x1="12" y1="15" x2="16" y2="15"></line>
                            </svg>

                        }

                        @case ('snippets') {

                            <svg viewBox="0 0 24 24">
                                <path d="M6 3h9l4 4v14H6z"></path>
                                <path d="M15 3v4h4"></path>
                                <line x1="9" y1="13" x2="15" y2="13"></line>
                                <line x1="9" y1="17" x2="13" y2="17"></line>
                            </svg>

                        }

                        @case ('profile') {

                            <svg viewBox="0 0 24 24">
                                <circle cx="12" cy="8" r="4"></circle>
                                <path d="M4 20c0-4 3.6-6 8-6s8 2 8 6"></path>
                            </svg>

                        }

                        @case ('settings') {

                            <svg viewBox="0 0 24 24">
                                <circle cx="12" cy="12" r="3"></circle>
                                <path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.6V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.9 1.7 1.7 0 0 0-1.6-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.9.3H9a1.7 1.7 0 0 0 1-1.6V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.6 1.7 1.7 0 0 0 1.9-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.9V9a1.7 1.7 0 0 0 1.6 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.6 1z"></path>
                            </svg>

                        }

                        @default {

                            <svg viewBox="0 0 24 24">
                                <circle cx="12" cy="12" r="8"></circle>
                            </svg>

                        }

                    }

                </span>

                <span class="sidebar__link-label">{{ item.title }}</span>

            </a>

        }

    </nav>

</div>
